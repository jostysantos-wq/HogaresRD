# /etc/nginx/sites-available/hogaresrd
# Nginx reverse proxy configuration for HogaresRD
#
# After placing this file:
#   sudo ln -s /etc/nginx/sites-available/hogaresrd /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limiting zone (10 requests/second per IP)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name hogaresrd.com www.hogaresrd.com;

    # If using Cloudflare (Full SSL mode), Cloudflare handles HTTPS.
    # This block serves HTTP which Cloudflare connects to on port 80.
    # For Full (Strict) mode, use the SSL block below instead.

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Restore real client IP from Cloudflare ────────────────────
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Upload size limit (for property photos) ──────────────────
    client_max_body_size 25M;

    # ── Static files — served directly by Nginx (fast) ───────────
    # Nginx serves these directly without touching Node.js
    location /uploads/ {
        alias /var/www/hogaresrd/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /icons/ {
        alias /var/www/hogaresrd/public/icons/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /var/www/hogaresrd/public/js/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Favicon and robots
    location = /favicon.ico {
        alias /var/www/hogaresrd/public/favicon.ico;
        expires 30d;
        access_log off;
    }

    location = /robots.txt {
        alias /var/www/hogaresrd/public/robots.txt;
        expires 1d;
        access_log off;
    }

    # Service worker — no cache (must always be fresh)
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API routes — rate limited ─────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Stripe webhook — higher rate limit (Stripe sends bursts)
    location /api/stripe/webhook {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All other routes — proxy to Node.js ──────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── HTTPS block (only needed for Cloudflare Full Strict mode) ────
# Uncomment this and comment the HTTP block above if using
# Cloudflare Origin Certificates for end-to-end encryption.
#
# server {
#     listen 443 ssl http2;
#     server_name hogaresrd.com www.hogaresrd.com;
#
#     ssl_certificate     /etc/ssl/cloudflare/hogaresrd.pem;
#     ssl_certificate_key /etc/ssl/cloudflare/hogaresrd.key;
#     ssl_protocols TLSv1.2 TLSv1.3;
#     ssl_ciphers HIGH:!aNULL:!MD5;
#
#     # ... (same location blocks as above) ...
# }
