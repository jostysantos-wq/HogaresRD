<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Broker — HogaresRD</title>
  <style>
    :root {
      --bg: #f0f4f9; --bg-card: #ffffff; --bg-section: #e8eef7;
      --text: #001840; --text-muted: #4d6a8a;
      --accent: #0038A8; --accent-hover: #002c8a; --accent-light: #dce8ff;
      --red: #CF142B; --green: #0a7c4f; --border: #d0dcea;
      --orange: #c07c1a; --purple: #4a2d9c;
      --shadow-sm: 0 2px 8px rgba(0,56,168,0.09); --shadow-md: 0 4px 20px rgba(0,56,168,0.13);
      --nav-bg: rgba(255,255,255,0.96); --toggle-bg: #b5ccf8; --toggle-knob: #ffffff;
    }
    [data-theme="dark"] {
      --bg: #000c24; --bg-card: #001238; --bg-section: #001428;
      --text: #e8f0fb; --text-muted: #7a9bbf;
      --accent: #5599ff; --accent-hover: #4080f0; --accent-light: #001238;
      --red: #e8374e; --green: #1db87a; --border: #002268;
      --orange: #e6a030; --purple: #8a6de0;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3); --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
      --nav-bg: rgba(0,12,36,0.97); --toggle-bg: #002268; --toggle-knob: #e8f0fb;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

    /* ── NAV ─────────────────────────────────────────────────── */
    nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .nav-inner { max-width: 1400px; margin: 0 auto; padding: 0 2rem; height: 68px; display: flex; align-items: center; gap: 1.5rem; }
    .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 20px; height: 20px; fill: #fff; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }
    .nav-spacer { flex: 1; }
    .nav-actions { display: flex; align-items: center; gap: 0.75rem; }
    .theme-toggle { background: var(--toggle-bg); border: none; border-radius: 50px; width: 48px; height: 26px; cursor: pointer; position: relative; flex-shrink: 0; }
    .theme-toggle::after { content: ''; width: 18px; height: 18px; background: var(--toggle-knob); border-radius: 50%; position: absolute; top: 4px; left: 4px; transition: transform 0.3s; }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(22px); }
    .user-menu { position: relative; }
    .user-avatar-btn { display: flex; align-items: center; gap: 0.5rem; background: none; border: 1.5px solid var(--border); border-radius: 50px; padding: 0.28rem 0.7rem 0.28rem 0.28rem; cursor: pointer; color: var(--text); }
    .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 0.68rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .user-first-name { font-size: 0.85rem; font-weight: 600; }
    .user-avatar-btn svg { width: 14px; height: 14px; fill: var(--text-muted); }
    .user-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow-md); min-width: 175px; overflow: hidden; z-index: 200; display: none; }
    .user-dropdown.open { display: block; }
    .dropdown-item { display: block; width: 100%; padding: 0.65rem 1rem; font-size: 0.88rem; color: var(--text); text-decoration: none; background: none; border: none; cursor: pointer; text-align: left; transition: background 0.15s; }
    .dropdown-item:hover { background: var(--accent-light); color: var(--accent); }
    .dropdown-divider { border: none; border-top: 1px solid var(--border); margin: 0.25rem 0; }
    .dropdown-logout { color: var(--red) !important; }

    /* ── PAGE ─────────────────────────────────────────────────── */
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
    .page-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
    .page-title svg { width: 28px; height: 28px; fill: var(--accent); }

    /* ── STATS ────────────────────────────────────────────────── */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; box-shadow: var(--shadow-sm); }
    .stat-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
    .stat-value { font-size: 1.7rem; font-weight: 800; }
    .stat-value.blue { color: var(--accent); }
    .stat-value.orange { color: var(--orange); }
    .stat-value.green { color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.purple { color: var(--purple); }

    /* ── FILTERS ──────────────────────────────────────────────── */
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.25rem; }
    .filter-btn { background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text-muted); font-size: 0.8rem; font-weight: 600; padding: 0.4rem 0.9rem; border-radius: 50px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── APP LIST ─────────────────────────────────────────────── */
    .app-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .app-card { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px; padding: 1.1rem 1.4rem; box-shadow: var(--shadow-sm); cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; display: grid; grid-template-columns: 1fr auto; gap: 0.5rem 1rem; align-items: center; }
    .app-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
    .app-card-main { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
    .app-client { font-weight: 700; font-size: 1.02rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-listing-title { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-contact { font-size: 0.78rem; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; }
    .app-card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
    .app-price { font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
    .app-date { font-size: 0.72rem; color: var(--text-muted); }

    /* ── STATUS BADGE ─────────────────────────────────────────── */
    .badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; padding: 0.28rem 0.7rem; border-radius: 50px; white-space: nowrap; }
    .badge-blue { background: rgba(0,56,168,0.12); color: var(--accent); }
    .badge-orange { background: rgba(192,124,26,0.12); color: var(--orange); }
    .badge-purple { background: rgba(74,45,156,0.12); color: var(--purple); }
    .badge-green { background: rgba(10,124,79,0.12); color: var(--green); }
    .badge-red { background: rgba(207,20,43,0.12); color: var(--red); }
    .badge-lg { font-size: 0.88rem; padding: 0.45rem 1.1rem; }

    /* ── DETAIL PANEL ─────────────────────────────────────────── */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; opacity: 0; transition: opacity 0.25s; }
    .detail-overlay.open { display: block; opacity: 1; }
    .detail-panel { position: fixed; top: 0; right: 0; width: 700px; max-width: 100vw; height: 100vh; background: var(--bg); border-left: 1px solid var(--border); z-index: 301; display: none; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; overflow: hidden; }
    .detail-panel.open { display: flex; transform: translateX(0); }
    .detail-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
    .detail-header-info { flex: 1; min-width: 0; }
    .detail-header-info h2 { font-size: 1.15rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-header-info p { font-size: 0.82rem; color: var(--text-muted); }
    .detail-close { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.3rem; display: flex; }
    .detail-close svg { width: 24px; height: 24px; fill: currentColor; }
    .detail-close:hover { color: var(--text); }

    /* ── TABS ─────────────────────────────────────────────────── */
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); background: var(--bg-card); flex-shrink: 0; overflow-x: auto; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; padding: 0.7rem 1.1rem; font-size: 0.82rem; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── DETAIL SECTIONS ─────────────────────────────────────── */
    .info-section { margin-bottom: 1.25rem; }
    .info-section-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1.5rem; }
    .info-item label { font-size: 0.75rem; color: var(--text-muted); display: block; }
    .info-item span { font-size: 0.9rem; font-weight: 600; }

    /* ── STATUS CHANGE ───────────────────────────────────────── */
    .status-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .status-btn { padding: 0.5rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; background: var(--bg-card); color: var(--text); }
    .status-btn:hover { border-color: var(--accent); color: var(--accent); }
    .status-btn.reject { border-color: var(--red); color: var(--red); }
    .status-btn.reject:hover { background: var(--red); color: #fff; }
    .reason-box { margin-top: 0.75rem; display: none; }
    .reason-box.show { display: block; }
    .reason-box textarea { width: 100%; min-height: 80px; border: 1.5px solid var(--border); border-radius: 10px; padding: 0.75rem; font-family: inherit; font-size: 0.88rem; background: var(--bg-card); color: var(--text); resize: vertical; }
    .reason-box textarea:focus { outline: none; border-color: var(--accent); }
    .reason-box .btn-send { margin-top: 0.5rem; }

    /* ── FORMS & BUTTONS ─────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: background 0.2s, opacity 0.2s; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover:not(:disabled) { background: #06653f; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #a3101f; }
    .btn-outline { background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.35rem 0.7rem; font-size: 0.78rem; border-radius: 8px; }
    input, select, textarea { font-family: inherit; }
    .form-group { margin-bottom: 0.85rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.25rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.55rem 0.75rem; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.88rem; background: var(--bg-card); color: var(--text); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }

    /* ── DOCS ─────────────────────────────────────────────────── */
    .doc-check-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .doc-check-item { display: flex; align-items: center; gap: 0.6rem; }
    .doc-check-item input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
    .doc-check-item label { font-size: 0.88rem; cursor: pointer; }
    .doc-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .doc-item { background: var(--bg-section); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .doc-item-info { flex: 1; min-width: 0; }
    .doc-item-name { font-weight: 600; font-size: 0.88rem; }
    .doc-item-meta { font-size: 0.75rem; color: var(--text-muted); }
    .doc-item-actions { display: flex; gap: 0.4rem; }

    /* ── TOURS ────────────────────────────────────────────────── */
    .tour-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .tour-item { background: var(--bg-section); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
    .tour-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.3rem; }
    .tour-item-date { font-weight: 700; font-size: 0.92rem; }
    .tour-item-detail { font-size: 0.82rem; color: var(--text-muted); }
    .tour-item-actions { display: flex; gap: 0.4rem; margin-top: 0.5rem; }

    /* ── PAYMENT ──────────────────────────────────────────────── */
    .receipt-preview { background: var(--bg-section); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; text-align: center; margin-bottom: 1rem; }
    .receipt-preview img { max-width: 100%; max-height: 400px; border-radius: 8px; }
    .receipt-preview iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }

    /* ── TIMELINE ─────────────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-item { display: flex; gap: 0.85rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); }
    .timeline-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.85rem; }
    .timeline-body { flex: 1; min-width: 0; }
    .timeline-desc { font-size: 0.88rem; }
    .timeline-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }
    .timeline-input { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .timeline-input input { flex: 1; }

    /* ── EMPTY STATE ──────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-state svg { width: 48px; height: 48px; fill: var(--text-muted); opacity: 0.3; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 0.92rem; }

    /* ── LOADING / TOAST ─────────────────────────────────────── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1.25rem; box-shadow: var(--shadow-md); font-size: 0.88rem; font-weight: 600; z-index: 500; transform: translateY(120%); transition: transform 0.3s; }
    .toast.show { transform: translateY(0); }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }

    /* ── MODAL ────────────────────────────────────────────────── */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; display: none; align-items: center; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--bg-card); border-radius: 16px; padding: 1.5rem; max-width: 500px; width: calc(100% - 2rem); max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-md); }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 1rem; }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-inner { padding: 0 1rem; }
      .page-wrap { padding: 1rem; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .app-card { grid-template-columns: 1fr; }
      .app-card-right { flex-direction: row; align-items: center; gap: 0.75rem; }
      .detail-panel { width: 100vw; }
      .info-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-bar { grid-template-columns: 1fr; }
      .page-title { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </div>
      <div class="logo-text">Hogares<span>RD</span></div>
    </a>
    <div class="nav-spacer"></div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" title="Cambiar tema"></button>
      <div class="user-menu" id="userMenu">
        <button class="user-avatar-btn" id="userAvatarBtn">
          <div class="user-avatar" id="userInitials">?</div>
          <span class="user-first-name" id="userFirstName"></span>
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </button>
        <div class="user-dropdown" id="userDropdown">
          <a href="/" class="dropdown-item">Inicio</a>
          <a href="/mapa.html" class="dropdown-item">Mapa</a>
          <hr class="dropdown-divider"/>
          <button class="dropdown-item dropdown-logout" id="logoutBtn">Cerrar Sesion</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="page-wrap">
  <h1 class="page-title">
    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    Panel de Aplicaciones
  </h1>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value blue" id="statTotal">--</div></div>
    <div class="stat-card"><div class="stat-label">En Revision</div><div class="stat-value orange" id="statReview">--</div></div>
    <div class="stat-card"><div class="stat-label">Docs Pendientes</div><div class="stat-value orange" id="statDocs">--</div></div>
    <div class="stat-card"><div class="stat-label">Aprobadas</div><div class="stat-value green" id="statApproved">--</div></div>
    <div class="stat-card"><div class="stat-label">Rechazadas</div><div class="stat-value red" id="statRejected">--</div></div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filtersBar"></div>

  <!-- App List -->
  <div id="appListContainer">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- Detail Overlay -->
<div class="detail-overlay" id="detailOverlay"></div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div class="detail-header-info">
      <h2 id="detailTitle">--</h2>
      <p id="detailSubtitle">--</p>
    </div>
    <div id="detailBadge"></div>
    <button class="detail-close" id="detailClose">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>

  <div class="tabs" id="detailTabs">
    <button class="tab-btn active" data-tab="resumen">Resumen</button>
    <button class="tab-btn" data-tab="estado">Estado</button>
    <button class="tab-btn" data-tab="documentos">Documentos</button>
    <button class="tab-btn" data-tab="tours">Tours</button>
    <button class="tab-btn" data-tab="pago">Pago</button>
    <button class="tab-btn" data-tab="timeline">Timeline</button>
  </div>

  <div class="tab-content">
    <div class="tab-pane active" id="pane-resumen"></div>
    <div class="tab-pane" id="pane-estado"></div>
    <div class="tab-pane" id="pane-documentos"></div>
    <div class="tab-pane" id="pane-tours"></div>
    <div class="tab-pane" id="pane-pago"></div>
    <div class="tab-pane" id="pane-timeline"></div>
  </div>
</div>

<!-- Doc Request Modal -->
<div class="modal-backdrop" id="docRequestModal">
  <div class="modal">
    <h3>Solicitar Documentos</h3>
    <div class="doc-check-list" id="docCheckList"></div>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeDocModal()">Cancelar</button>
      <button class="btn btn-primary" id="sendDocRequest">Enviar Solicitud</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ── Auth ───────────────────────────────────────────────────
  const token = localStorage.getItem('token');
  if (!token) { location.href = '/login'; return; }

  let currentUser = null;
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.role !== 'agency') { location.href = '/login'; return; }
    currentUser = payload;
  } catch(e) { location.href = '/login'; return; }

  // ── Constants ──────────────────────────────────────────────
  const STATUS_LABELS = {
    aplicado:'Aplicado', en_revision:'En Revision', documentos_requeridos:'Documentos Requeridos',
    documentos_enviados:'Documentos Enviados', documentos_insuficientes:'Documentos Insuficientes',
    en_aprobacion:'En Aprobacion', reservado:'Reservado', aprobado:'Aprobado',
    pendiente_pago:'Pendiente de Pago', pago_enviado:'Pago Enviado', pago_aprobado:'Pago Aprobado',
    completado:'Completado', rechazado:'Rechazado'
  };

  const STATUS_FLOW = {
    aplicado: ['en_revision','rechazado'],
    en_revision: ['documentos_requeridos','en_aprobacion','rechazado'],
    documentos_requeridos: ['documentos_enviados','rechazado'],
    documentos_enviados: ['en_aprobacion','documentos_insuficientes','rechazado'],
    documentos_insuficientes: ['documentos_requeridos','rechazado'],
    en_aprobacion: ['reservado','aprobado','rechazado'],
    reservado: ['aprobado','rechazado'],
    aprobado: ['pendiente_pago','rechazado'],
    pendiente_pago: ['pago_enviado','rechazado'],
    pago_enviado: ['pago_aprobado','pendiente_pago','rechazado'],
    pago_aprobado: ['completado']
  };

  const DOC_TYPES = [
    { type:'cedula', label:'Cedula de Identidad' },
    { type:'passport', label:'Pasaporte' },
    { type:'income_proof', label:'Comprobante de Ingresos' },
    { type:'bank_statement', label:'Estado de Cuenta Bancario' },
    { type:'employment_letter', label:'Carta de Trabajo' },
    { type:'tax_return', label:'Declaracion de Impuestos' },
    { type:'pre_approval', label:'Carta de Pre-Aprobacion Bancaria' },
    { type:'proof_of_funds', label:'Prueba de Fondos' },
    { type:'other', label:'Otro Documento' }
  ];

  function statusColor(s) {
    if (['aplicado','en_revision','pendiente_pago','pago_enviado'].includes(s)) return 'blue';
    if (s.startsWith('documentos')) return 'orange';
    if (['en_aprobacion','reservado'].includes(s)) return 'purple';
    if (['aprobado','pago_aprobado','completado'].includes(s)) return 'green';
    if (s === 'rechazado') return 'red';
    return 'blue';
  }

  function badgeHTML(status, lg) {
    return `<span class="badge badge-${statusColor(status)}${lg?' badge-lg':''}">${STATUS_LABELS[status]||status}</span>`;
  }

  function fmtDate(d) {
    if (!d) return '--';
    const dt = new Date(d);
    return dt.toLocaleDateString('es-DO', { year:'numeric', month:'short', day:'numeric' });
  }

  function fmtDateTime(d) {
    if (!d) return '--';
    const dt = new Date(d);
    return dt.toLocaleDateString('es-DO', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function fmtPrice(p) {
    if (!p) return '--';
    return 'RD$ ' + Number(p).toLocaleString('es-DO');
  }

  // ── API Helper ─────────────────────────────────────────────
  const API = (path, opts = {}) => {
    opts.headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}`, ...(opts.headers||{}) };
    if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
    return fetch(path, opts).then(async r => {
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(data.message || data.error || 'Error');
      return data;
    });
  };

  // ── Toast ──────────────────────────────────────────────────
  const toastEl = document.getElementById('toast');
  function toast(msg, type = 'success') {
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + type;
    setTimeout(() => toastEl.classList.remove('show'), 3000);
  }

  // ── Theme ──────────────────────────────────────────────────
  const html = document.documentElement;
  const saved = localStorage.getItem('theme');
  if (saved) html.dataset.theme = saved;
  document.getElementById('themeToggle').onclick = () => {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem('theme', next);
  };

  // ── User Menu ──────────────────────────────────────────────
  const initials = (currentUser.name || currentUser.email || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('userInitials').textContent = initials;
  document.getElementById('userFirstName').textContent = (currentUser.name || currentUser.email || '').split(' ')[0];

  const userAvatarBtn = document.getElementById('userAvatarBtn');
  const userDropdown = document.getElementById('userDropdown');
  userAvatarBtn.onclick = () => userDropdown.classList.toggle('open');
  document.addEventListener('click', e => { if (!e.target.closest('.user-menu')) userDropdown.classList.remove('open'); });
  document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); location.href = '/login'; };

  // ── State ──────────────────────────────────────────────────
  let applications = [];
  let currentFilter = 'all';
  let currentApp = null;

  // ── Filters ────────────────────────────────────────────────
  const filtersBar = document.getElementById('filtersBar');
  function renderFilters() {
    const statuses = ['all', ...Object.keys(STATUS_LABELS)];
    filtersBar.innerHTML = statuses.map(s =>
      `<button class="filter-btn${s===currentFilter?' active':''}" data-filter="${s}">${s==='all'?'Todas':STATUS_LABELS[s]}</button>`
    ).join('');
    filtersBar.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        currentFilter = btn.dataset.filter;
        renderFilters();
        renderAppList();
      };
    });
  }

  // ── Stats ──────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('statTotal').textContent = applications.length;
    document.getElementById('statReview').textContent = applications.filter(a=>a.status==='en_revision').length;
    document.getElementById('statDocs').textContent = applications.filter(a=>['documentos_requeridos','documentos_insuficientes'].includes(a.status)).length;
    document.getElementById('statApproved').textContent = applications.filter(a=>['aprobado','pago_aprobado','completado'].includes(a.status)).length;
    document.getElementById('statRejected').textContent = applications.filter(a=>a.status==='rechazado').length;
  }

  // ── App List ───────────────────────────────────────────────
  const appListContainer = document.getElementById('appListContainer');

  function renderAppList() {
    const filtered = currentFilter === 'all' ? applications : applications.filter(a => a.status === currentFilter);
    if (!filtered.length) {
      appListContainer.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        <p>No hay aplicaciones${currentFilter!=='all'?' con este estado':''}.</p>
      </div>`;
      return;
    }
    appListContainer.innerHTML = `<div class="app-list">${filtered.map(a => {
      const client = a.client || a.user || {};
      const listing = a.listing || {};
      return `<div class="app-card" data-id="${a._id || a.id}">
        <div class="app-card-main">
          <div class="app-client">${esc(client.name || client.full_name || 'Sin nombre')}</div>
          <div class="app-listing-title">${esc(listing.title || 'Propiedad')}</div>
          <div class="app-contact">
            ${client.phone ? `<span>${esc(client.phone)}</span>` : ''}
            ${client.email ? `<span>${esc(client.email)}</span>` : ''}
          </div>
        </div>
        <div class="app-card-right">
          ${badgeHTML(a.status)}
          <div class="app-price">${fmtPrice(listing.price)}</div>
          <div class="app-date">${fmtDate(a.created_at || a.createdAt)}</div>
        </div>
      </div>`;
    }).join('')}</div>`;

    appListContainer.querySelectorAll('.app-card').forEach(card => {
      card.onclick = () => openDetail(card.dataset.id);
    });
  }

  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── Detail Panel ───────────────────────────────────────────
  const detailOverlay = document.getElementById('detailOverlay');
  const detailPanel = document.getElementById('detailPanel');

  function closeDetail() {
    detailOverlay.classList.remove('open');
    detailPanel.classList.remove('open');
    currentApp = null;
  }
  document.getElementById('detailClose').onclick = closeDetail;
  detailOverlay.onclick = closeDetail;

  // Tabs
  document.getElementById('detailTabs').addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + btn.dataset.tab).classList.add('active');
  });

  async function openDetail(id) {
    // reset to first tab
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelector('.tab-btn[data-tab="resumen"]').classList.add('active');
    document.getElementById('pane-resumen').classList.add('active');

    detailOverlay.classList.add('open');
    detailPanel.classList.add('open');
    document.getElementById('pane-resumen').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const data = await API(`/api/applications/${id}`);
      currentApp = data.application || data;
      renderDetail();
    } catch(e) {
      toast(e.message, 'error');
      closeDetail();
    }
  }

  function renderDetail() {
    const a = currentApp;
    const client = a.client || a.user || {};
    const listing = a.listing || {};

    document.getElementById('detailTitle').textContent = client.name || client.full_name || 'Aplicacion';
    document.getElementById('detailSubtitle').textContent = listing.title || 'Propiedad';
    document.getElementById('detailBadge').innerHTML = badgeHTML(a.status, true);

    renderResumen(a, client, listing);
    renderEstado(a);
    renderDocumentos(a);
    renderTours(a);
    renderPago(a);
    renderTimeline(a);
  }

  // ── Resumen Tab ────────────────────────────────────────────
  function renderResumen(a, client, listing) {
    document.getElementById('pane-resumen').innerHTML = `
      <div class="info-section">
        <div class="info-section-title">Informacion del Cliente</div>
        <div class="info-grid">
          <div class="info-item"><label>Nombre</label><span>${esc(client.name||client.full_name||'--')}</span></div>
          <div class="info-item"><label>Email</label><span>${esc(client.email||'--')}</span></div>
          <div class="info-item"><label>Telefono</label><span>${esc(client.phone||'--')}</span></div>
          <div class="info-item"><label>Metodo de contacto</label><span>${esc(a.contact_method||a.contactMethod||'--')}</span></div>
        </div>
      </div>
      <div class="info-section">
        <div class="info-section-title">Propiedad</div>
        <div class="info-grid">
          <div class="info-item"><label>Titulo</label><span>${esc(listing.title||'--')}</span></div>
          <div class="info-item"><label>Precio</label><span>${fmtPrice(listing.price)}</span></div>
          <div class="info-item"><label>Ubicacion</label><span>${esc(listing.location||listing.city||'--')}</span></div>
          <div class="info-item"><label>Tipo</label><span>${esc(listing.type||listing.property_type||'--')}</span></div>
        </div>
      </div>
      <div class="info-section">
        <div class="info-section-title">Detalles de la Aplicacion</div>
        <div class="info-grid">
          <div class="info-item"><label>Financiamiento</label><span>${esc(a.financing||a.financing_type||'--')}</span></div>
          <div class="info-item"><label>Pre-aprobacion</label><span>${a.pre_approval || a.preApproval ? 'Si' : 'No'}</span></div>
          <div class="info-item"><label>Presupuesto</label><span>${fmtPrice(a.budget)}</span></div>
          <div class="info-item"><label>Tiempo estimado</label><span>${esc(a.timeline||a.purchase_timeline||'--')}</span></div>
          <div class="info-item"><label>Intencion</label><span>${esc(a.intent||a.purchase_intent||'--')}</span></div>
          <div class="info-item"><label>Fecha</label><span>${fmtDate(a.created_at||a.createdAt)}</span></div>
        </div>
      </div>
      ${a.notes ? `<div class="info-section"><div class="info-section-title">Notas</div><p style="font-size:0.9rem;">${esc(a.notes)}</p></div>` : ''}
    `;
  }

  // ── Estado Tab ─────────────────────────────────────────────
  function renderEstado(a) {
    const transitions = STATUS_FLOW[a.status] || [];
    const pane = document.getElementById('pane-estado');
    pane.innerHTML = `
      <div class="info-section">
        <div class="info-section-title">Estado Actual</div>
        <div style="margin:0.75rem 0">${badgeHTML(a.status, true)}</div>
      </div>
      ${transitions.length ? `
      <div class="info-section">
        <div class="info-section-title">Cambiar Estado</div>
        <div class="status-actions" id="statusActions">
          ${transitions.map(t =>
            `<button class="status-btn${t==='rechazado'?' reject':''}" data-to="${t}">${STATUS_LABELS[t]}</button>`
          ).join('')}
        </div>
        <div class="reason-box" id="reasonBox">
          <textarea id="reasonText" placeholder="Razon del rechazo (requerido)..."></textarea>
          <button class="btn btn-danger btn-send" id="confirmReject">Confirmar Rechazo</button>
        </div>
      </div>` : `<p style="color:var(--text-muted);font-size:0.88rem;">No hay transiciones disponibles para este estado.</p>`}
    `;

    if (transitions.length) {
      pane.querySelectorAll('.status-btn').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.to === 'rechazado') {
            document.getElementById('reasonBox').classList.add('show');
          } else {
            changeStatus(btn.dataset.to);
          }
        };
      });
      const confirmBtn = document.getElementById('confirmReject');
      if (confirmBtn) {
        confirmBtn.onclick = () => {
          const reason = document.getElementById('reasonText').value.trim();
          if (!reason) { toast('La razon es requerida para rechazar', 'error'); return; }
          changeStatus('rechazado', reason);
        };
      }
    }
  }

  async function changeStatus(to, reason) {
    try {
      const body = { status: to };
      if (reason) body.reason = reason;
      await API(`/api/applications/${currentApp._id || currentApp.id}/status`, { method:'PUT', body });
      toast('Estado actualizado');
      currentApp.status = to;
      renderDetail();
      loadApplications();
    } catch(e) { toast(e.message, 'error'); }
  }

  // ── Documentos Tab ─────────────────────────────────────────
  function renderDocumentos(a) {
    const docs = a.documents || [];
    const requested = docs.filter(d => d.status === 'requested' || d.status === 'pending');
    const uploaded = docs.filter(d => ['uploaded','approved','rejected'].includes(d.status));

    document.getElementById('pane-documentos').innerHTML = `
      <div style="margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="openDocModal()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="#fff"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM16 18H8v-2h8v2zm0-4H8v-2h8v2zm-2-6V3.5L19.5 9H14z"/></svg>
          Solicitar Documentos
        </button>
      </div>
      ${requested.length ? `
        <div class="info-section">
          <div class="info-section-title">Documentos Solicitados</div>
          <div class="doc-list">
            ${requested.map(d => `
              <div class="doc-item">
                <div class="doc-item-info">
                  <div class="doc-item-name">${esc(d.label || DOC_TYPES.find(t=>t.type===d.type)?.label || d.type)}</div>
                  <div class="doc-item-meta">${badgeHTML(d.status === 'requested' ? 'documentos_requeridos' : 'aplicado')}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
      ${uploaded.length ? `
        <div class="info-section">
          <div class="info-section-title">Documentos Subidos</div>
          <div class="doc-list">
            ${uploaded.map(d => `
              <div class="doc-item">
                <div class="doc-item-info">
                  <div class="doc-item-name">${esc(d.label || DOC_TYPES.find(t=>t.type===d.type)?.label || d.type)}</div>
                  <div class="doc-item-meta">
                    ${d.status === 'approved' ? badgeHTML('aprobado') : d.status === 'rejected' ? badgeHTML('rechazado') : badgeHTML('documentos_enviados')}
                    ${d.uploaded_at ? ' &middot; ' + fmtDate(d.uploaded_at) : ''}
                  </div>
                </div>
                <div class="doc-item-actions">
                  <a href="/api/applications/${a._id||a.id}/documents/${d._id||d.id}/file" target="_blank" class="btn btn-outline btn-sm">Ver</a>
                  ${d.status === 'uploaded' ? `
                    <button class="btn btn-success btn-sm" onclick="reviewDoc('${d._id||d.id}','approved')">Aprobar</button>
                    <button class="btn btn-danger btn-sm" onclick="reviewDoc('${d._id||d.id}','rejected')">Rechazar</button>
                  ` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
      ${!requested.length && !uploaded.length ? '<div class="empty-state"><p>No hay documentos todavia.</p></div>' : ''}
    `;
  }

  // Doc request modal
  window.openDocModal = function() {
    const list = document.getElementById('docCheckList');
    list.innerHTML = DOC_TYPES.map(d =>
      `<div class="doc-check-item">
        <input type="checkbox" id="doc_${d.type}" value="${d.type}">
        <label for="doc_${d.type}">${d.label}</label>
      </div>`
    ).join('');
    document.getElementById('docRequestModal').classList.add('open');
  };

  window.closeDocModal = function() {
    document.getElementById('docRequestModal').classList.remove('open');
  };

  document.getElementById('sendDocRequest').onclick = async () => {
    const checked = [...document.querySelectorAll('#docCheckList input:checked')];
    if (!checked.length) { toast('Selecciona al menos un documento', 'error'); return; }
    const documents = checked.map(c => {
      const dt = DOC_TYPES.find(d=>d.type===c.value);
      return { type: c.value, label: dt?.label || c.value, required: true };
    });
    try {
      await API(`/api/applications/${currentApp._id||currentApp.id}/documents/request`, { method:'POST', body: { documents } });
      toast('Documentos solicitados');
      closeDocModal();
      const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
      currentApp = data.application || data;
      renderDocumentos(currentApp);
    } catch(e) { toast(e.message, 'error'); }
  };

  window.reviewDoc = async function(docId, status) {
    const note = status === 'rejected' ? prompt('Nota de rechazo:') : '';
    if (status === 'rejected' && note === null) return;
    try {
      await API(`/api/applications/${currentApp._id||currentApp.id}/documents/${docId}/review`, { method:'PUT', body: { status, note: note || '' } });
      toast(status === 'approved' ? 'Documento aprobado' : 'Documento rechazado');
      const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
      currentApp = data.application || data;
      renderDocumentos(currentApp);
    } catch(e) { toast(e.message, 'error'); }
  };

  // ── Tours Tab ──────────────────────────────────────────────
  function renderTours(a) {
    const tours = a.tours || [];
    document.getElementById('pane-tours').innerHTML = `
      <div class="info-section">
        <div class="info-section-title">Agendar Tour</div>
        <div class="info-grid" style="margin-bottom:0.75rem;">
          <div class="form-group"><label>Fecha</label><input type="date" id="tourDate"></div>
          <div class="form-group"><label>Hora</label><input type="time" id="tourTime"></div>
        </div>
        <div class="form-group"><label>Ubicacion</label><input type="text" id="tourLocation" placeholder="Direccion o punto de encuentro"></div>
        <div class="form-group"><label>Notas</label><textarea id="tourNotes" rows="2" placeholder="Notas adicionales..."></textarea></div>
        <button class="btn btn-primary" id="scheduleTourBtn">Agendar Tour</button>
      </div>
      ${tours.length ? `
        <div class="info-section">
          <div class="info-section-title">Tours Programados</div>
          <div class="tour-list">
            ${tours.map(t => `
              <div class="tour-item">
                <div class="tour-item-header">
                  <div class="tour-item-date">${fmtDate(t.scheduled_date)} ${t.scheduled_time || ''}</div>
                  <span class="badge badge-${t.status==='completed'?'green':t.status==='cancelled'?'red':'blue'}">${
                    t.status==='scheduled'?'Programado':t.status==='completed'?'Completado':'Cancelado'
                  }</span>
                </div>
                ${t.location ? `<div class="tour-item-detail">Lugar: ${esc(t.location)}</div>` : ''}
                ${t.notes ? `<div class="tour-item-detail">${esc(t.notes)}</div>` : ''}
                ${t.status === 'scheduled' ? `
                  <div class="tour-item-actions">
                    <button class="btn btn-success btn-sm" onclick="updateTour('${t._id||t.id}','completed')">Completado</button>
                    <button class="btn btn-danger btn-sm" onclick="updateTour('${t._id||t.id}','cancelled')">Cancelar</button>
                  </div>
                ` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
    `;

    document.getElementById('scheduleTourBtn').onclick = async () => {
      const scheduled_date = document.getElementById('tourDate').value;
      const scheduled_time = document.getElementById('tourTime').value;
      const location = document.getElementById('tourLocation').value;
      const notes = document.getElementById('tourNotes').value;
      if (!scheduled_date || !scheduled_time) { toast('Fecha y hora son requeridas', 'error'); return; }
      try {
        await API(`/api/applications/${currentApp._id||currentApp.id}/tours`, { method:'POST', body: { scheduled_date, scheduled_time, location, notes } });
        toast('Tour agendado');
        const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
        currentApp = data.application || data;
        renderTours(currentApp);
      } catch(e) { toast(e.message, 'error'); }
    };
  }

  window.updateTour = async function(tourId, status) {
    try {
      await API(`/api/applications/${currentApp._id||currentApp.id}/tours/${tourId}`, { method:'PUT', body: { status } });
      toast('Tour actualizado');
      const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
      currentApp = data.application || data;
      renderTours(currentApp);
    } catch(e) { toast(e.message, 'error'); }
  };

  // ── Pago Tab ───────────────────────────────────────────────
  function renderPago(a) {
    const payment = a.payment || {};
    const hasReceipt = payment.receipt_url || payment.receipt;
    const appId = a._id || a.id;
    const pane = document.getElementById('pane-pago');

    pane.innerHTML = `
      ${hasReceipt ? `
        <div class="info-section">
          <div class="info-section-title">Recibo de Pago</div>
          <div class="receipt-preview" id="receiptPreview">
            <div class="loading"><div class="spinner"></div></div>
          </div>
          ${payment.status !== 'approved' && payment.status !== 'rejected' ? `
            <div style="display:flex;gap:0.5rem;">
              <button class="btn btn-success" id="verifyPaymentBtn">Verificar Pago</button>
              <button class="btn btn-danger" id="rejectPaymentBtn">Rechazar Pago</button>
            </div>
          ` : `
            <p style="font-size:0.9rem;font-weight:600;">
              Estado del pago: ${payment.status === 'approved' ? '<span style="color:var(--green)">Verificado</span>' : '<span style="color:var(--red)">Rechazado</span>'}
            </p>
            ${payment.notes ? `<p style="font-size:0.85rem;color:var(--text-muted);margin-top:0.3rem;">Nota: ${esc(payment.notes)}</p>` : ''}
          `}
        </div>
      ` : `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM4 0h16v2H4zm0 22h16v2H4z"/></svg>
          <p>No se ha subido recibo de pago.</p>
        </div>
      `}
    `;

    if (hasReceipt) {
      const preview = document.getElementById('receiptPreview');
      const receiptUrl = `/api/applications/${appId}/payment/receipt`;
      // Try to determine type — default to image
      const url = payment.receipt_url || receiptUrl;
      if (url.endsWith('.pdf') || payment.file_type === 'pdf') {
        preview.innerHTML = `<iframe src="${receiptUrl}"></iframe>`;
      } else {
        preview.innerHTML = `<img src="${receiptUrl}" alt="Recibo" onerror="this.parentElement.innerHTML='<p>No se pudo cargar el recibo. <a href=\\'${receiptUrl}\\' target=\\'_blank\\'>Descargar</a></p>'">`;
      }

      const verifyBtn = document.getElementById('verifyPaymentBtn');
      const rejectBtn = document.getElementById('rejectPaymentBtn');
      if (verifyBtn) {
        verifyBtn.onclick = () => verifyPayment(true);
      }
      if (rejectBtn) {
        rejectBtn.onclick = () => verifyPayment(false);
      }
    }
  }

  async function verifyPayment(approved) {
    const notes = approved ? '' : (prompt('Razon del rechazo:') || '');
    if (!approved && notes === '') return;
    try {
      await API(`/api/applications/${currentApp._id||currentApp.id}/payment/verify`, { method:'PUT', body: { approved, notes } });
      toast(approved ? 'Pago verificado' : 'Pago rechazado');
      const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
      currentApp = data.application || data;
      renderPago(currentApp);
    } catch(e) { toast(e.message, 'error'); }
  }

  // ── Timeline Tab ───────────────────────────────────────────
  function renderTimeline(a) {
    const events = a.timeline_events || a.timeline || [];
    const pane = document.getElementById('pane-timeline');

    const iconMap = {
      status_change: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
      document: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>',
      tour: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>',
      payment: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>',
      message: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>',
      default: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>'
    };

    pane.innerHTML = `
      <div class="timeline">
        ${events.length ? events.map(ev => `
          <div class="timeline-item">
            <div class="timeline-icon">${iconMap[ev.type] || iconMap.default}</div>
            <div class="timeline-body">
              <div class="timeline-desc">${esc(ev.description || ev.message || ev.text || '--')}</div>
              <div class="timeline-meta">${esc(ev.actor_name || ev.actor || '')} &middot; ${fmtDateTime(ev.date || ev.created_at || ev.createdAt)}</div>
            </div>
          </div>
        `).join('') : '<div class="empty-state"><p>No hay eventos en el timeline.</p></div>'}
      </div>
      <div class="timeline-input">
        <input type="text" id="timelineMsg" placeholder="Agregar una nota..." class="form-group" style="margin:0;padding:0.55rem 0.75rem;border:1.5px solid var(--border);border-radius:10px;font-size:0.88rem;background:var(--bg-card);color:var(--text);">
        <button class="btn btn-primary" id="sendMsgBtn">Enviar</button>
      </div>
    `;

    document.getElementById('sendMsgBtn').onclick = async () => {
      const input = document.getElementById('timelineMsg');
      const message = input.value.trim();
      if (!message) return;
      try {
        await API(`/api/applications/${currentApp._id||currentApp.id}/message`, { method:'POST', body: { message } });
        toast('Nota agregada');
        input.value = '';
        const data = await API(`/api/applications/${currentApp._id||currentApp.id}`);
        currentApp = data.application || data;
        renderTimeline(currentApp);
      } catch(e) { toast(e.message, 'error'); }
    };

    // Enter key
    document.getElementById('timelineMsg').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('sendMsgBtn').click();
    });
  }

  // ── Load Data ──────────────────────────────────────────────
  async function loadApplications() {
    try {
      const data = await API('/api/applications');
      applications = data.applications || data || [];
      updateStats();
      renderAppList();
    } catch(e) {
      appListContainer.innerHTML = `<div class="empty-state"><p>Error al cargar aplicaciones: ${esc(e.message)}</p></div>`;
    }
  }

  // ── Init ───────────────────────────────────────────────────
  renderFilters();
  loadApplications();

})();
</script>
</body>
</html>
