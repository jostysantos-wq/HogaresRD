<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta — HogaresRD</title>
  <style>
    :root {
      --bg: #eef3fa; --bg-card: #ffffff; --text: #001840; --text-muted: #4d6a8a;
      --accent: #002D62; --accent-hover: #001a45; --border: #c4d4e8;
      --input-bg: #f5f8fd; --toggle-bg: #c4d4e8; --toggle-knob: #ffffff;
      --shadow: 0 4px 24px rgba(0,45,98,0.12); --error: #CF142B;
    }
    [data-theme="dark"] {
      --bg: #00101f; --bg-card: #001e3c; --text: #e8f0fb; --text-muted: #7a9bbf;
      --accent: #4a90d9; --accent-hover: #3a7bc8; --border: #003060;
      --input-bg: #00162e; --toggle-bg: #003060; --toggle-knob: #e8f0fb;
      --shadow: 0 4px 24px rgba(0,0,0,0.5); --error: #e8374e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--accent); padding: 0 2rem; height: 58px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: #fff; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
    .nav-logo svg { width: 28px; height: 28px; fill: #fff; }
    .theme-toggle { background: rgba(255,255,255,0.25); border: none; border-radius: 50px; width: 52px; height: 28px; cursor: pointer; position: relative; transition: background 0.3s; display: flex; align-items: center; padding: 0 4px; }
    .theme-toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; left: 4px; transition: transform 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(24px); }
    .toggle-icons { display: flex; justify-content: space-between; width: 100%; pointer-events: none; }
    .toggle-icons svg { width: 12px; height: 12px; flex-shrink: 0; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--bg-card); border-radius: 18px; box-shadow: var(--shadow); padding: 2.5rem 2.25rem; width: 100%; max-width: 440px; }
    .auth-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 0.35rem; }
    .auth-subtitle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.4rem; }
    .field input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }
    .field input.invalid { border-color: var(--error); }

    .hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.3rem; }
    .error-msg { font-size: 0.85rem; color: var(--error); background: color-mix(in srgb, var(--error) 10%, transparent); border: 1px solid color-mix(in srgb, var(--error) 30%, transparent); border-radius: 8px; padding: 0.65rem 1rem; margin-bottom: 1.1rem; display: none; }
    .error-msg.visible { display: block; }

    .btn-primary { width: 100%; padding: 0.85rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 0.25rem; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .auth-links { margin-top: 1.5rem; text-align: center; font-size: 0.88rem; color: var(--text-muted); }
    .auth-links a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-links a:hover { text-decoration: underline; }

    footer { text-align: center; padding: 1.25rem; font-size: 0.82rem; color: var(--text-muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <nav>
    <a href="/home" class="nav-logo">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      HogaresRD
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">
      <span class="toggle-icons">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#f59e0b"><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-13a1 1 0 0 0 1-1V2a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1zm0 14a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1zm9-5h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2zM4 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#94a3b8"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </span>
    </button>
  </nav>

  <main>
    <div class="auth-card">
      <h1 class="auth-title">Crear Cuenta</h1>
      <p class="auth-subtitle">Gratis. Recibe recomendaciones personalizadas y guarda tus favoritas.</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="registerForm" novalidate>
        <div class="field">
          <label>Nombre completo</label>
          <input type="text" id="name" placeholder="Juan Pérez" required autocomplete="name" />
        </div>
        <div class="field">
          <label>Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" required autocomplete="new-password" />
          <p class="hint">Al menos 8 caracteres</p>
        </div>
        <div class="field">
          <label>Confirmar contraseña</label>
          <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Crear Cuenta</button>
      </form>

      <div class="auth-links">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
      </div>
    </div>
  </main>

  <footer>&copy; 2026 HogaresRD &mdash; Bienes raíces en la República Dominicana</footer>

  <script src="/js/auth.js"></script>
  <script>
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    function toggleTheme() {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }

    redirectIfAuth();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.classList.remove('visible');

      const name            = document.getElementById('name').value.trim();
      const email           = document.getElementById('email').value.trim();
      const password        = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!name || !email || !password) {
        err.textContent = 'Todos los campos son requeridos.';
        return err.classList.add('visible');
      }
      if (password.length < 8) {
        err.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        return err.classList.add('visible');
      }
      if (password !== confirmPassword) {
        err.textContent = 'Las contraseñas no coinciden.';
        return err.classList.add('visible');
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al crear la cuenta');
        window.location.href = '/login?registered=1';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Crear Cuenta';
      }
    });
  </script>
</body>
</html>
