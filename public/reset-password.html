<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer Contraseña — HogaresRD</title>
  <style>
    :root {
      --bg: #f0f4ff; --bg-card: #ffffff; --text: #001840; --text-muted: #4d6a8a;
      --accent: #0038A8; --accent-hover: #002c8a; --border: #c4d4e8;
      --input-bg: #f5f8fd; --toggle-bg: #b5ccf8; --toggle-knob: #ffffff;
      --shadow: 0 4px 24px rgba(0,56,168,0.13); --error: #CF142B;
    }
    [data-theme="dark"] {
      --bg: #000c24; --bg-card: #001238; --text: #e8f0fb; --text-muted: #7a9bbf;
      --accent: #5599ff; --accent-hover: #4080f0; --border: #002268;
      --input-bg: #00162e; --toggle-bg: #002268; --toggle-knob: #e8f0fb;
      --shadow: 0 4px 24px rgba(0,0,0,0.5); --error: #e8374e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--accent); padding: 0 2rem; height: 58px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: #fff; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
    .nav-logo svg { width: 28px; height: 28px; fill: #fff; }
    .theme-toggle { background: rgba(255,255,255,0.25); border: none; border-radius: 50px; width: 52px; height: 28px; cursor: pointer; position: relative; transition: background 0.3s; display: flex; align-items: center; padding: 0 4px; }
    .theme-toggle::after { content: ''; width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; left: 4px; transition: transform 0.3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(24px); }
    .toggle-icons { display: flex; justify-content: space-between; width: 100%; pointer-events: none; }
    .toggle-icons svg { width: 12px; height: 12px; flex-shrink: 0; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--bg-card); border-radius: 18px; box-shadow: var(--shadow); padding: 2.5rem 2.25rem; width: 100%; max-width: 420px; }
    .auth-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.35rem; }
    .auth-subtitle { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; line-height: 1.5; }

    .field { margin-bottom: 1.1rem; }
    .field label { display: block; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.4rem; }
    .field input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; background: var(--input-bg); color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }

    .msg { font-size: 0.85rem; border-radius: 8px; padding: 0.65rem 1rem; margin-bottom: 1.1rem; display: none; }
    .msg.visible { display: block; }
    .msg.error { color: var(--error); background: color-mix(in srgb, var(--error) 10%, transparent); border: 1px solid color-mix(in srgb, var(--error) 30%, transparent); }
    .msg.success { color: #0a7c4f; background: #d1f5e3; border: 1px solid #a3e9c8; }

    .btn-primary { width: 100%; padding: 0.85rem; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.15s; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .auth-links { margin-top: 1.5rem; text-align: center; font-size: 0.88rem; color: var(--text-muted); }
    .auth-links a { color: var(--accent); text-decoration: none; font-weight: 600; }

    footer { text-align: center; padding: 1.25rem; font-size: 0.82rem; color: var(--text-muted); border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <nav>
    <a href="/home" class="nav-logo">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      HogaresRD
    </a>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">
      <span class="toggle-icons">
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#f59e0b"><path d="M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0-13a1 1 0 0 0 1-1V2a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1zm0 14a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1zm9-5h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2zM4 12a1 1 0 0 0-1-1H2a1 1 0 0 0 0 2h1a1 1 0 0 0 1-1z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor" style="color:#94a3b8"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </span>
    </button>
  </nav>

  <main>
    <div class="auth-card">
      <!-- State A: no token → enter email for forgot-password link -->
      <div id="stateEmail">
        <h1 class="auth-title">¿Olvidaste tu contraseña?</h1>
        <p class="auth-subtitle">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        <div class="msg error" id="emailErr"></div>
        <div class="msg success" id="emailOk"></div>
        <form id="forgotForm" novalidate>
          <div class="field">
            <label>Correo electrónico</label>
            <input type="email" id="forgotEmail" placeholder="tu@correo.com" required />
          </div>
          <button type="submit" class="btn-primary" id="forgotBtn">Enviar enlace</button>
        </form>
        <div class="auth-links"><a href="/login">← Volver al inicio de sesión</a></div>
      </div>

      <!-- State B: token in URL → enter new password -->
      <div id="stateReset" style="display:none;">
        <h1 class="auth-title">Nueva Contraseña</h1>
        <p class="auth-subtitle">Elige una contraseña segura de al menos 8 caracteres.</p>
        <div class="msg error" id="resetErr"></div>
        <div class="msg success" id="resetOk"></div>
        <form id="resetForm" novalidate>
          <div class="field">
            <label>Nueva contraseña</label>
            <input type="password" id="newPassword" placeholder="Mínimo 8 caracteres" required />
          </div>
          <div class="field">
            <label>Confirmar contraseña</label>
            <input type="password" id="confirmNewPassword" placeholder="Repite tu contraseña" required />
          </div>
          <button type="submit" class="btn-primary" id="resetBtn">Guardar nueva contraseña</button>
        </form>
        <div class="auth-links"><a href="/login">← Ir al inicio de sesión</a></div>
      </div>
    </div>
  </main>

  <footer>&copy; 2026 HogaresRD &mdash; Bienes raíces en la República Dominicana</footer>

  <script>
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    function toggleTheme() {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next); localStorage.setItem('theme', next);
    }

    // Determine which state to show
    const token = new URLSearchParams(window.location.search).get('token');
    if (token) {
      document.getElementById('stateEmail').style.display = 'none';
      document.getElementById('stateReset').style.display = '';
    }

    // Forgot password
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('forgotBtn');
      const err = document.getElementById('emailErr');
      const ok  = document.getElementById('emailOk');
      err.classList.remove('visible'); ok.classList.remove('visible');
      btn.disabled = true; btn.textContent = 'Enviando...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('forgotEmail').value.trim() }),
        });
        const data = await res.json();
        ok.textContent = data.message;
        ok.classList.add('visible');
        document.getElementById('forgotForm').reset();
      } catch {
        err.textContent = 'Error al enviar. Intenta de nuevo.';
        err.classList.add('visible');
      } finally {
        btn.disabled = false; btn.textContent = 'Enviar enlace';
      }
    });

    // Reset password
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn      = document.getElementById('resetBtn');
      const err      = document.getElementById('resetErr');
      const ok       = document.getElementById('resetOk');
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmNewPassword').value;
      err.classList.remove('visible'); ok.classList.remove('visible');

      if (password.length < 8) {
        err.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        return err.classList.add('visible');
      }
      if (password !== confirm) {
        err.textContent = 'Las contraseñas no coinciden.';
        return err.classList.add('visible');
      }

      btn.disabled = true; btn.textContent = 'Guardando...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        ok.textContent = data.message + ' Redirigiendo...';
        ok.classList.add('visible');
        setTimeout(() => window.location.href = '/login', 2000);
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('visible');
        btn.disabled = false; btn.textContent = 'Guardar nueva contraseña';
      }
    });
  </script>
</body>
</html>
