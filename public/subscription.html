<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Suscripción — HogaresRD</title>
  <link rel="stylesheet" href="/css/core.css">

  <style>
    :root { --toggle-bg: #CBD5E1; --toggle-knob: #FFFFFF; }
    [data-theme="dark"] { --toggle-bg: #2D3F58; --toggle-knob: #EDF2F7; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    nav { background: var(--accent); padding: 0 2rem; height: 58px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: #fff; font-size: 1.25rem; font-weight: 800; }
    .nav-logo svg { width: 28px; height: 28px; fill: #fff; }
    .nav-back { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.35rem; transition: color 0.2s; }
    .nav-back:hover { color: #fff; }

    main { flex: 1; max-width: 560px; margin: 0 auto; width: 100%; padding: 2.5rem 1rem; }

    .page-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.25rem; }
    .page-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 2rem; }

    /* Status card */
    .status-card {
      background: var(--bg-card); border-radius: 8px;
      border: 1.5px solid var(--border); box-shadow: var(--shadow);
      overflow: hidden; margin-bottom: 1.25rem;
    }
    .status-card-header {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.75rem; border-radius: 10px;
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-active   { background: var(--green-bg); color: var(--green); }
    .status-trialing { background: #dbeafe; color: #1d4ed8; }
    .status-trial    { background: #dbeafe; color: #1d4ed8; }
    .status-past_due { background: #fef3c7; color: #92400e; }
    .status-canceled { background: #fee2e2; color: #991b1b; }
    .status-none     { background: var(--bg); color: var(--text-muted); }

    .status-card-body { padding: 1.25rem 1.5rem; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-muted); }
    .info-value { font-weight: 600; }

    /* Action buttons */
    .actions { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.25rem; }
    .btn-manage {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.85rem; border-radius: 10px;
      font-size: 0.92rem; font-weight: 700; cursor: pointer;
      border: none; transition: all 0.2s; text-decoration: none;
    }
    .btn-manage svg { width: 17px; height: 17px; fill: currentColor; flex-shrink: 0; }
    .btn-primary-action { background: var(--accent); color: #fff; }
    .btn-primary-action:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-secondary-action { background: var(--bg-card); color: var(--text); border: 1.5px solid var(--border) !important; }
    .btn-secondary-action:hover { border-color: var(--accent) !important; color: var(--accent); }
    .btn-manage:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* No subscription state */
    .no-sub-card {
      background: var(--bg-card); border-radius: 8px;
      border: 2px dashed var(--border); padding: 2.5rem 1.5rem;
      text-align: center; margin-bottom: 1.25rem;
    }
    .no-sub-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .no-sub-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 0.4rem; }
    .no-sub-sub { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .secure-note { display: flex; align-items: center; justify-content: center; gap: 0.4rem; font-size: 0.76rem; color: var(--text-muted); margin-top: 0.5rem; }
    .secure-note svg { width: 13px; height: 13px; fill: var(--text-muted); }

    footer { text-align: center; padding: 1.25rem; font-size: 0.82rem; color: var(--text-muted); border-top: 1px solid var(--border); }

    #loadingState { text-align: center; padding: 3rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <nav>
    <a href="/home" class="nav-logo">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      HogaresRD
    </a>
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="/broker" class="nav-back">← Volver al panel</a>
    </div>
  </nav>

  <main>
    <h1 class="page-title">Mi Suscripción</h1>
    <p class="page-sub">Administra tu plan, método de pago y facturación.</p>

    <div id="loadingState">Cargando información de suscripción…</div>
    <div id="mainContent" style="display:none"></div>
  </main>

  <footer>&copy; 2026 HogaresRD &mdash; Bienes raíces en la República Dominicana</footer>

  <script src="/js/auth.js"></script>
  <script>
    const html = document.documentElement;
    html.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    function toggleTheme() {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      const label = document.getElementById('themeLabel');
      const knob = document.getElementById('themeKnob');
      if (label) label.textContent = next === 'dark' ? 'Modo Claro' : 'Modo Oscuro';
      if (knob) knob.style.left = next === 'dark' ? '18px' : '2px';
    }

    const STATUS_LABELS = {
      active:   '✓ Activa',
      trialing: '⏳ En prueba',
      trial:    '⏳ Prueba gratuita',
      past_due: '⚠️ Pago pendiente',
      canceled: '✗ Cancelada',
      none:     'Sin suscripción',
      expired:  '✗ Prueba expirada',
    };

    function fmt(isoDate) {
      if (!isoDate) return '—';
      return new Date(isoDate).toLocaleDateString('es-DO', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    (async () => {
      const token = localStorage.getItem('hogaresrd_token');
      const user  = (() => { try { return JSON.parse(localStorage.getItem('hogaresrd_user') || 'null'); } catch { return null; } })();

      if (!user) { window.location.href = '/login?next=/subscription'; return; }

      let status = null;
      try {
        const res = await fetch('/api/stripe/status', {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
          credentials: 'include',
        });
        if (res.ok) status = await res.json();
      } catch(e) {
        document.getElementById('loadingState').style.display = 'none';
        const content = document.getElementById('mainContent');
        content.style.display = 'block';
        content.innerHTML = `
          <div class="no-sub-card" style="border-color:var(--red);">
            <div class="no-sub-icon">⚠️</div>
            <div class="no-sub-title">Error al cargar la suscripción</div>
            <div class="no-sub-sub">No se pudo conectar con el servidor. Por favor intenta de nuevo.</div>
            <button class="btn-manage btn-primary-action" style="max-width:200px;margin:0 auto;" onclick="location.reload()">Reintentar</button>
          </div>`;
        return;
      }

      document.getElementById('loadingState').style.display = 'none';
      const content = document.getElementById('mainContent');
      content.style.display = 'block';

      if (!status?.required) {
        content.innerHTML = `
          <div class="no-sub-card">
            <div class="no-sub-icon">✅</div>
            <div class="no-sub-title">Tu cuenta es gratuita</div>
            <div class="no-sub-sub">Las cuentas de cliente no requieren suscripción.</div>
            <a href="/home" class="btn-manage btn-primary-action" style="max-width:200px;margin:0 auto;">Explorar propiedades</a>
          </div>`;
        return;
      }

      const st        = status.status || 'none';
      const badgeCls  = 'status-' + st;
      const hasMethod = status.hasPaymentMethod;
      const planName  = status.planName || 'Plan mensual';

      // No subscription yet — show setup CTA
      if (st === 'none' || (!hasMethod && st === 'trial')) {
        content.innerHTML = `
          <div class="no-sub-card">
            <div class="no-sub-icon">💳</div>
            <div class="no-sub-title">Aún no tienes método de pago</div>
            <div class="no-sub-sub">Agrega una tarjeta para activar tu plan y no perder el acceso cuando termine la prueba.</div>
            <a href="/subscribe" class="btn-manage btn-primary-action" style="max-width:240px;margin:0 auto;">Activar plan →</a>
          </div>`;
        return;
      }

      content.innerHTML = `
        <div class="status-card">
          <div class="status-card-header">
            <div>
              <div style="font-size:1rem;font-weight:800;">${planName}</div>
            </div>
            <span class="status-badge ${badgeCls}">${STATUS_LABELS[st] || st}</span>
          </div>
          <div class="status-card-body">
            <div class="info-row">
              <span class="info-label">Estado</span>
              <span class="info-value">${STATUS_LABELS[st] || st}</span>
            </div>
            ${status.trialEndsAt ? `
            <div class="info-row">
              <span class="info-label">Prueba gratuita hasta</span>
              <span class="info-value">${fmt(status.trialEndsAt)}</span>
            </div>` : ''}
            ${status.subscriptionRenewsAt ? `
            <div class="info-row">
              <span class="info-label">Próximo cobro</span>
              <span class="info-value">${fmt(status.subscriptionRenewsAt)}</span>
            </div>` : ''}
            <div class="info-row">
              <span class="info-label">Método de pago</span>
              <span class="info-value">${hasMethod ? 'Tarjeta registrada ✓' : 'No configurado'}</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn-manage btn-primary-action" id="portalBtn">
            <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            Administrar suscripción (cambiar tarjeta, cancelar…)
          </button>
          ${!hasMethod ? `
          <a href="/subscribe" class="btn-manage btn-secondary-action">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            Agregar método de pago
          </a>` : ''}
        </div>

        <div style="margin-top:12px;">
          <button class="btn-manage" id="cancelBtn" style="background:transparent;color:var(--text-muted);border:1px solid var(--border);font-size:0.82rem;">
            Cancelar suscripcion
          </button>
        </div>

        <div class="secure-note">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/></svg>
          Facturacion gestionada de forma segura por Stripe
        </div>`;

      // Portal button handler (for card changes only)
      document.getElementById('portalBtn')?.addEventListener('click', async function() {
        this.disabled = true;
        this.textContent = 'Abriendo portal…';
        try {
          const res  = await fetch('/api/stripe/create-portal', {
            method: 'POST',
            headers: token ? { 'Authorization': `Bearer ${token}` } : {},
            credentials: 'include',
          });
          const data = await res.json();
          if (data.url) window.location.href = data.url;
          else alert(data.error || 'Error al abrir el portal.');
        } catch(e) {
          alert('Error de conexion.');
        }
        this.disabled = false;
        this.textContent = 'Administrar suscripcion';
      });

      // ── Cancellation Retention Flow ─────────────────────────────────
      document.getElementById('cancelBtn')?.addEventListener('click', () => showCancelModal());

      let cancelStats = null;

      async function showCancelModal() {
        // Fetch usage stats
        try {
          const r = await fetch('/api/stripe/cancel-stats', {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {},
            credentials: 'include',
          });
          cancelStats = await r.json();
        } catch { cancelStats = {}; }

        const overlay = document.createElement('div');
        overlay.id = 'cancelOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `<div id="cancelModal" style="background:var(--bg-card,#fff);border-radius:16px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);padding:32px;">
          ${cancelStep1()}
        </div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) closeCancelModal(); });
        document.body.appendChild(overlay);
      }

      function closeCancelModal() {
        document.getElementById('cancelOverlay')?.remove();
      }

      function setCancelStep(html) {
        const modal = document.getElementById('cancelModal');
        if (modal) modal.innerHTML = html;
      }

      // Step 1: What you'll lose
      function cancelStep1() {
        const s = cancelStats || {};
        return `
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.5rem;margin-bottom:8px;">⚠️</div>
            <h2 style="margin:0 0 8px;font-size:1.3rem;font-weight:800;">Esto es lo que perderas</h2>
            <p style="color:var(--text-muted,#666);font-size:0.9rem;">Al cancelar, perderas acceso a todas estas herramientas y datos.</p>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;">
            <div style="background:var(--bg,#f7fafc);padding:14px;border-radius:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:#002D62;">${s.listings || 0}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">Propiedades</div>
            </div>
            <div style="background:var(--bg,#f7fafc);padding:14px;border-radius:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:#002D62;">${s.applications || 0}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">Aplicaciones</div>
            </div>
            <div style="background:var(--bg,#f7fafc);padding:14px;border-radius:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:#002D62;">${s.totalViews || 0}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">Vistas totales</div>
            </div>
            <div style="background:var(--bg,#f7fafc);padding:14px;border-radius:10px;text-align:center;">
              <div style="font-size:1.4rem;font-weight:800;color:#002D62;">${s.conversations || 0}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">Conversaciones</div>
            </div>
          </div>
          <button onclick="setCancelStep(cancelStep2())" style="width:100%;padding:12px;background:#CE1126;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;">Continuar con la cancelacion</button>
          <button onclick="closeCancelModal()" style="width:100%;padding:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;margin-top:8px;font-size:0.9rem;">Mejor no, quiero quedarme</button>
        `;
      }

      // Step 2: Pause option
      function cancelStep2() {
        return `
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.5rem;margin-bottom:8px;">⏸️</div>
            <h2 style="margin:0 0 8px;font-size:1.3rem;font-weight:800;">Pausa en vez de cancelar?</h2>
            <p style="color:var(--text-muted,#666);font-size:0.9rem;">Puedes pausar tu suscripcion por 1 mes sin costo. Tus datos y propiedades se mantienen.</p>
          </div>
          <button onclick="acceptOffer('pause')" style="width:100%;padding:14px;background:#002D62;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;margin-bottom:10px;">Pausar por 1 mes (gratis)</button>
          <button onclick="setCancelStep(cancelStep3())" style="width:100%;padding:12px;background:none;border:1px solid var(--border,#e2e8f0);border-radius:10px;color:var(--text,#333);cursor:pointer;font-size:0.9rem;">No, quiero cancelar</button>
        `;
      }

      // Step 3: Reason
      function cancelStep3() {
        return `
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.5rem;margin-bottom:8px;">💬</div>
            <h2 style="margin:0 0 8px;font-size:1.3rem;font-weight:800;">Cuentanos por que</h2>
            <p style="color:var(--text-muted,#666);font-size:0.9rem;">Tu feedback nos ayuda a mejorar para agentes como tu.</p>
          </div>
          <select id="cancelReason" style="width:100%;padding:12px;border:1px solid var(--border,#e2e8f0);border-radius:10px;font-size:0.9rem;margin-bottom:12px;background:var(--bg-card,#fff);color:var(--text,#333);">
            <option value="">Selecciona un motivo...</option>
            <option value="expensive">Muy caro para mi presupuesto</option>
            <option value="no_leads">No estoy recibiendo suficientes leads</option>
            <option value="competitor">Encontre otra plataforma</option>
            <option value="business_pause">Mi negocio esta en pausa temporal</option>
            <option value="missing_features">Le faltan funciones que necesito</option>
            <option value="other">Otro motivo</option>
          </select>
          <textarea id="cancelFeedback" placeholder="Comentarios adicionales (opcional)" style="width:100%;padding:12px;border:1px solid var(--border,#e2e8f0);border-radius:10px;font-size:0.85rem;min-height:70px;resize:vertical;margin-bottom:16px;font-family:inherit;background:var(--bg-card,#fff);color:var(--text,#333);"></textarea>
          <button onclick="submitCancelReason()" style="width:100%;padding:12px;background:#CE1126;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;">Continuar</button>
          <button onclick="closeCancelModal()" style="width:100%;padding:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;margin-top:8px;font-size:0.9rem;">Cancelar</button>
        `;
      }

      // Step 4: Targeted offer or final cancel
      function cancelStep4(reason) {
        const offers = {
          expensive: { title: '30% de descuento por 3 meses', desc: 'Entendemos. Te ofrecemos un 30% de descuento por los proximos 3 meses para que sigas creciendo.', offer: 'discount', btnText: 'Aplicar descuento', btnColor: '#002D62' },
          no_leads: { title: 'Mejora tu visibilidad', desc: 'Nuestro equipo puede ayudarte a optimizar tus listados para recibir mas leads. Ademas, te ofrecemos 30% de descuento.', offer: 'discount', btnText: 'Aplicar descuento y optimizar', btnColor: '#002D62' },
          business_pause: { title: 'Pausa gratuita de 1 mes', desc: 'Perfecto para una pausa temporal. Tus datos se mantienen y puedes reactivar cuando quieras.', offer: 'pause', btnText: 'Pausar suscripcion', btnColor: '#002D62' },
          competitor: { title: 'Antes de irte...', desc: 'Nos encantaria saber que funciones ofrece la otra plataforma. Tu feedback nos ayuda a competir mejor. Te ofrecemos 30% off.', offer: 'discount', btnText: 'Quedarme con 30% off', btnColor: '#002D62' },
          missing_features: { title: 'Estamos mejorando constantemente', desc: 'Tu feedback es valioso. Te ofrecemos 30% de descuento mientras trabajamos en nuevas funciones.', offer: 'discount', btnText: 'Aplicar descuento', btnColor: '#002D62' },
        };
        const o = offers[reason] || null;

        if (o) {
          return `
            <div style="text-align:center;margin-bottom:20px;">
              <div style="font-size:2.5rem;margin-bottom:8px;">🎁</div>
              <h2 style="margin:0 0 8px;font-size:1.3rem;font-weight:800;">${o.title}</h2>
              <p style="color:var(--text-muted,#666);font-size:0.9rem;">${o.desc}</p>
            </div>
            <button onclick="acceptOffer('${o.offer}')" style="width:100%;padding:14px;background:${o.btnColor};color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;margin-bottom:10px;">${o.btnText}</button>
            <button onclick="finalCancel()" style="width:100%;padding:12px;background:none;border:1px solid #CE1126;border-radius:10px;color:#CE1126;cursor:pointer;font-size:0.9rem;">No gracias, cancelar definitivamente</button>
          `;
        }

        // No targeted offer — final confirmation
        return `
          <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:2.5rem;margin-bottom:8px;">👋</div>
            <h2 style="margin:0 0 8px;font-size:1.3rem;font-weight:800;">Confirmar cancelacion</h2>
            <p style="color:var(--text-muted,#666);font-size:0.9rem;">Tu suscripcion se cancelara al final del periodo de facturacion actual. Tus datos se mantendran por 90 dias.</p>
          </div>
          <button onclick="finalCancel()" style="width:100%;padding:14px;background:#CE1126;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:0.95rem;">Cancelar suscripcion</button>
          <button onclick="closeCancelModal()" style="width:100%;padding:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;margin-top:8px;font-size:0.9rem;">Mejor no</button>
        `;
      }

      function submitCancelReason() {
        const reason = document.getElementById('cancelReason')?.value;
        if (!reason) { alert('Por favor selecciona un motivo.'); return; }
        setCancelStep(cancelStep4(reason));
      }

      async function acceptOffer(offer) {
        const reason   = document.getElementById('cancelReason')?.value || '';
        const feedback = document.getElementById('cancelFeedback')?.value || '';
        setCancelStep('<div style="text-align:center;padding:40px 0;"><div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:#002D62;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div><p>Procesando...</p></div>');
        try {
          const r = await fetch('/api/stripe/cancel-feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
            credentials: 'include',
            body: JSON.stringify({ reason, feedback, accepted_offer: offer }),
          });
          const d = await r.json();
          setCancelStep(`
            <div style="text-align:center;padding:20px 0;">
              <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
              <h2 style="margin:0 0 12px;font-size:1.3rem;font-weight:800;">Listo!</h2>
              <p style="color:var(--text-muted);font-size:0.9rem;">${d.message || 'Tu solicitud ha sido procesada.'}</p>
              <button onclick="closeCancelModal();location.reload();" style="margin-top:20px;padding:12px 28px;background:#002D62;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;">Cerrar</button>
            </div>
          `);
        } catch(e) {
          setCancelStep('<div style="text-align:center;padding:20px;"><p style="color:#CE1126;">Error al procesar. Intenta de nuevo.</p><button onclick="closeCancelModal()" style="margin-top:12px;padding:10px 24px;background:#002D62;color:#fff;border:none;border-radius:10px;cursor:pointer;">Cerrar</button></div>');
        }
      }

      async function finalCancel() {
        const reason   = document.getElementById('cancelReason')?.value || 'other';
        const feedback = document.getElementById('cancelFeedback')?.value || '';
        setCancelStep('<div style="text-align:center;padding:40px 0;"><div style="width:36px;height:36px;border:3px solid var(--border);border-top-color:#CE1126;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;"></div><p>Procesando cancelacion...</p></div>');
        try {
          const r = await fetch('/api/stripe/cancel-feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
            credentials: 'include',
            body: JSON.stringify({ reason, feedback, accepted_offer: null }),
          });
          const d = await r.json();
          if (d.url) window.location.href = d.url;
          else {
            setCancelStep('<div style="text-align:center;padding:20px;"><p>' + (d.message || 'Cancelacion procesada.') + '</p><button onclick="closeCancelModal();location.reload();" style="margin-top:12px;padding:10px 24px;background:#002D62;color:#fff;border:none;border-radius:10px;cursor:pointer;">Cerrar</button></div>');
          }
        } catch(e) {
          alert('Error de conexion.');
          closeCancelModal();
        }
      }
    })();
  </script>
<script src="/js/pixel.js" defer></script>
<script src="/js/cookie-consent.js"></script>
</body>
</html>
